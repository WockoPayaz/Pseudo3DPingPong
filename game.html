<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Table Tennis</title>
<style>
  :root{
    --cream:#f2ede2;
    --bronze:#c9a15a;
    --steel:#3f6fae;
    --brick:#c0392b;
    --ink:#0d1b2a;
  }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--ink);
    overflow:hidden;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    touch-action:none;
  }
  canvas{
    display:block;
    cursor:none;
    width:100vw;
    height:100vh;
  }

  /* ---------- Scoreboard ---------- */
  #scoreboard{
    position:fixed;
    top:18px; left:50%;
    transform:translateX(-50%);
    display:flex;
    align-items:center;
    gap:0;
    background:linear-gradient(180deg,#152738,#0c1826);
    border:1px solid rgba(201,161,90,0.35);
    border-radius:10px;
    box-shadow:0 8px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
    padding:10px 0;
    z-index:10;
    user-select:none;
  }
  .score-side{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:0 26px;
    min-width:90px;
  }
  .score-label{
    font-size:11px;
    letter-spacing:3px;
    font-weight:600;
    text-transform:uppercase;
    opacity:0.75;
  }
  #playerLabel{ color:var(--brick); }
  #aiLabel{ color:var(--steel); }
  .score-value{
    font-family:'Courier New', Courier, monospace;
    font-size:40px;
    font-weight:700;
    line-height:1;
    margin-top:4px;
    color:var(--cream);
    text-shadow:0 0 12px rgba(242,237,226,0.25);
    font-variant-numeric:tabular-nums;
  }
  .score-divider{
    width:1px;
    align-self:stretch;
    background:rgba(201,161,90,0.35);
    margin:2px 0;
  }
  #matchLabel{
    position:absolute;
    bottom:-19px;
    left:50%;
    transform:translateX(-50%);
    font-size:9px;
    letter-spacing:2px;
    color:var(--bronze);
    text-transform:uppercase;
    white-space:nowrap;
    opacity:0.8;
  }

  /* ---------- Hint ---------- */
  #hint{
    position:fixed;
    bottom:22px; left:50%;
    transform:translateX(-50%);
    color:rgba(242,237,226,0.8);
    font-size:13px;
    letter-spacing:0.5px;
    background:rgba(13,27,42,0.55);
    padding:8px 16px;
    border-radius:20px;
    border:1px solid rgba(201,161,90,0.25);
    transition:opacity 1s ease;
    z-index:10;
    pointer-events:none;
    text-align:center;
  }
  #hint.fade{ opacity:0; }

  /* ---------- Game over overlay ---------- */
  #overlay{
    position:fixed;
    inset:0;
    background:rgba(6,12,20,0.82);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:20;
    backdrop-filter: blur(2px);
  }
  #overlay.show{ display:flex; }
  #overlayTitle{
    color:var(--bronze);
    font-size:14px;
    letter-spacing:4px;
    text-transform:uppercase;
    margin-bottom:8px;
  }
  #overlayWinner{
    color:var(--cream);
    font-size:44px;
    font-weight:700;
    margin-bottom:28px;
    text-shadow:0 0 20px rgba(201,161,90,0.4);
  }
  #restartBtn{
    background:var(--bronze);
    color:var(--ink);
    border:none;
    padding:12px 30px;
    font-size:15px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    border-radius:6px;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(0,0,0,0.4);
  }
  #restartBtn:hover{ background:#dcb56e; }
</style>
</head>
<body>

<div id="scoreboard">
  <div class="score-side">
    <div class="score-label" id="playerLabel">You</div>
    <div class="score-value" id="scorePlayer">0</div>
  </div>
  <div class="score-divider"></div>
  <div class="score-side">
    <div class="score-label" id="aiLabel">CPU</div>
    <div class="score-value" id="scoreAI">0</div>
  </div>
  <div id="matchLabel">First to 11</div>
</div>

<div id="hint">Move your mouse to aim (left/right) and reach (up/down). Overlap the ball to return it.</div>

<div id="overlay">
  <div id="overlayTitle">Match Over</div>
  <div id="overlayWinner">You Win!</div>
  <button id="restartBtn">Play Again</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
(function(){
  "use strict";

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  const scorePlayerEl = document.getElementById('scorePlayer');
  const scoreAIEl = document.getElementById('scoreAI');
  const overlayEl = document.getElementById('overlay');
  const overlayWinnerEl = document.getElementById('overlayWinner');
  const restartBtn = document.getElementById('restartBtn');
  const hintEl = document.getElementById('hint');

  // ---------------------------------------------------------------
  // Perspective / table geometry
  // ---------------------------------------------------------------
  let W, H, NEAR_Y, FAR_Y, NEAR_WIDTH, FAR_WIDTH, CENTER_X;
  const FAR_SCALE = 0.28;

  function tableWidthAtZ(z){ return NEAR_WIDTH + (FAR_WIDTH - NEAR_WIDTH) * z; }
  function tableYAtZ(z){ return NEAR_Y + (FAR_Y - NEAR_Y) * z; }
  function scaleAtZ(z){ return 1 - z * (1 - FAR_SCALE); }
  function xToScreen(x, z){ return CENTER_X + x * (tableWidthAtZ(z) / 2); }
  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }
  function lerp(a, b, t){ return a + (b - a) * t; }

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    NEAR_Y = H * 0.90;
    FAR_Y = H * 0.20;
    CENTER_X = W / 2;
    NEAR_WIDTH = Math.min(W * 0.68, 800);
    FAR_WIDTH = NEAR_WIDTH * 0.24;
  }
  resize();
  window.addEventListener('resize', resize);

  // ---------------------------------------------------------------
  // Input
  // ---------------------------------------------------------------
  let mouseX = 0, mouseY = 0;
  function setPointer(clientX, clientY){
    const rect = canvas.getBoundingClientRect();
    mouseX = clientX - rect.left;
    mouseY = clientY - rect.top;
  }
  mouseX = W/2; mouseY = NEAR_Y;

  window.addEventListener('mousemove', e => setPointer(e.clientX, e.clientY));
  window.addEventListener('touchmove', e => {
    if(e.touches && e.touches[0]){ setPointer(e.touches[0].clientX, e.touches[0].clientY); }
    e.preventDefault();
  }, { passive:false });
  window.addEventListener('touchstart', e => {
    if(e.touches && e.touches[0]){ setPointer(e.touches[0].clientX, e.touches[0].clientY); }
  }, { passive:false });

  // ---------------------------------------------------------------
  // Game entities
  // ---------------------------------------------------------------
  const player = { x:0, z:0.05, hitPulse:0 };
  const ai     = { x:0, z:0.96, hitPulse:0, error:0 };
  const ball   = { x:0, z:0.5, vx:0, vz:0.42, h:1, vy:0, squash:0 };

  let scorePlayer = 0, scoreAI = 0;
  const WIN_SCORE = 11;
  let paused = false;

  const effects = []; // bounce / hit ring effects

  function spawnEffect(x, z, color){
    effects.push({ x, z, t:0, duration:0.45, color });
  }

  function resetBall(){
    ball.x = 0;
    ball.z = 0.5;
    ball.h = 1.1;
    ball.vy = 0;
    ball.squash = 0;
    ball.vz = (Math.random() < 0.5 ? 1 : -1) * 0.42;
    ball.vx = (Math.random() - 0.5) * 0.15;
    ai.error = (Math.random() - 0.5) * 0.28;
  }
  resetBall();

  function updateScoreUI(){
    scorePlayerEl.textContent = scorePlayer;
    scoreAIEl.textContent = scoreAI;
  }

  function afterPoint(){
    updateScoreUI();
    if(scorePlayer >= WIN_SCORE || scoreAI >= WIN_SCORE){
      paused = true;
      overlayWinnerEl.textContent = (scorePlayer > scoreAI) ? "You Win!" : "CPU Wins!";
      overlayEl.classList.add('show');
    } else {
      resetBall();
    }
  }

  restartBtn.addEventListener('click', () => {
    scorePlayer = 0; scoreAI = 0;
    updateScoreUI();
    overlayEl.classList.remove('show');
    paused = false;
    resetBall();
    lastTime = null;
  });

  setTimeout(() => hintEl.classList.add('fade'), 5500);

  // ---------------------------------------------------------------
  // Update
  // ---------------------------------------------------------------
  function update(dt){
    if(paused) return;

    // --- player paddle follows mouse (X = aim, Y = forward reach) ---
    const targetX = clamp((mouseX - CENTER_X) / (NEAR_WIDTH / 2), -1, 1);
    let rawZ = (mouseY - NEAR_Y) / (FAR_Y - NEAR_Y);
    const targetZ = clamp(rawZ, 0.02, 0.42);
    player.x += (targetX - player.x) * 0.22;
    player.z += (targetZ - player.z) * 0.18;
    if(player.hitPulse > 0) player.hitPulse = Math.max(0, player.hitPulse - dt * 3);

    // --- AI paddle chases the ball with limited reaction speed ---
    const aiTargetX = clamp(ball.x + ai.error, -1, 1);
    ai.x += (aiTargetX - ai.x) * 0.065;
    if(ai.hitPulse > 0) ai.hitPulse = Math.max(0, ai.hitPulse - dt * 3);

    // --- ball motion along Z (depth) and X (lateral) ---
    ball.z += ball.vz * dt;
    ball.x += ball.vx * dt;

    // vertical bounce simulation (gravity + damping)
    ball.vy += -2.6 * dt;
    ball.h += ball.vy * dt;
    if(ball.h <= 0){
      ball.h = 0;
      ball.vy = -ball.vy * 0.6;
      if(ball.vy < 0.35) ball.vy = 0.55;
      ball.squash = 1;
      spawnEffect(ball.x, ball.z, 'rgba(242,237,226,0.85)');
    }
    if(ball.squash > 0) ball.squash = Math.max(0, ball.squash - dt * 4);

    // out of bounds sideways
    if(Math.abs(ball.x) > 1.15){
      if(ball.vz > 0) aiScores(); else playerScores();
      return;
    }

    // --- AI hit zone (far side) ---
    if(ball.vz > 0 && ball.z >= 0.85 && ball.z < 1){
      if(Math.abs(ball.x - ai.x) < 0.30){
        ball.vz = -Math.min(Math.abs(ball.vz) * 1.05, 0.85);
        ball.vx = clamp((ball.x - ai.x) * 1.1 + (Math.random() - 0.5) * 0.1, -0.6, 0.6);
        ball.vy = 1.0;
        ball.squash = 1;
        ai.hitPulse = 1;
        spawnEffect(ball.x, ball.z, 'rgba(120,180,255,0.9)');
      }
    }
    if(ball.z >= 1){ playerScores(); return; }

    // --- player hit zone (near side, depends on paddle reach) ---
    if(ball.vz < 0 && ball.z <= player.z + 0.09 && ball.z > 0){
      if(Math.abs(ball.x - player.x) < 0.32){
        ball.vz = Math.min(Math.abs(ball.vz) * 1.05, 0.85);
        ball.vx = clamp((ball.x - player.x) * 1.2, -0.6, 0.6);
        ball.vy = 1.0;
        ball.squash = 1;
        player.hitPulse = 1;
        spawnEffect(ball.x, ball.z, 'rgba(192,57,43,0.9)');
      }
    }
    if(ball.z <= 0){ aiScores(); return; }

    // --- effects lifecycle ---
    for(let i = effects.length - 1; i >= 0; i--){
      effects[i].t += dt;
      if(effects[i].t >= effects[i].duration) effects.splice(i, 1);
    }
  }

  function playerScores(){ scorePlayer++; afterPoint(); }
  function aiScores(){ scoreAI++; afterPoint(); }

  // ---------------------------------------------------------------
  // Draw
  // ---------------------------------------------------------------
  function drawBackground(){
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#0a1420');
    g.addColorStop(0.45, '#101f30');
    g.addColorStop(1, '#182635');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // soft spotlight glow toward the vanishing point
    const glow = ctx.createRadialGradient(CENTER_X, FAR_Y, 10, CENTER_X, FAR_Y, W * 0.5);
    glow.addColorStop(0, 'rgba(201,161,90,0.14)');
    glow.addColorStop(1, 'rgba(201,161,90,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);
  }

  function tableCorners(){
    return {
      nearL: { x: CENTER_X - NEAR_WIDTH/2, y: NEAR_Y },
      nearR: { x: CENTER_X + NEAR_WIDTH/2, y: NEAR_Y },
      farL:  { x: CENTER_X - FAR_WIDTH/2,  y: FAR_Y },
      farR:  { x: CENTER_X + FAR_WIDTH/2,  y: FAR_Y }
    };
  }

  function drawTable(){
    const c = tableCorners();

    // table surface
    const g = ctx.createLinearGradient(0, FAR_Y, 0, NEAR_Y);
    g.addColorStop(0, '#0f5a3f');
    g.addColorStop(1, '#1f9165');
    ctx.beginPath();
    ctx.moveTo(c.nearL.x, c.nearL.y);
    ctx.lineTo(c.nearR.x, c.nearR.y);
    ctx.lineTo(c.farR.x, c.farR.y);
    ctx.lineTo(c.farL.x, c.farL.y);
    ctx.closePath();
    ctx.fillStyle = g;
    ctx.fill();

    // boundary lines
    ctx.strokeStyle = 'rgba(242,237,226,0.9)';
    ctx.lineWidth = 3;
    ctx.stroke();

    // center length-wise line
    ctx.beginPath();
    ctx.moveTo(CENTER_X, NEAR_Y);
    ctx.lineTo(CENTER_X, FAR_Y);
    ctx.strokeStyle = 'rgba(242,237,226,0.55)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // front apron (table thickness cue)
    ctx.beginPath();
    ctx.moveTo(c.nearL.x, c.nearL.y);
    ctx.lineTo(c.nearR.x, c.nearR.y);
    ctx.lineTo(c.nearR.x, c.nearR.y + 14);
    ctx.lineTo(c.nearL.x, c.nearL.y + 14);
    ctx.closePath();
    ctx.fillStyle = '#0a3d2a';
    ctx.fill();
  }

  function drawNet(){
    const z = 0.5;
    const y = tableYAtZ(z);
    const width = tableWidthAtZ(z);
    const scale = scaleAtZ(z);
    const left = CENTER_X - width/2;
    const right = CENTER_X + width/2;
    const height = 42 * scale;

    // mesh
    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = '#f2ede2';
    ctx.fillRect(left, y - height, right - left, height);
    ctx.globalAlpha = 1;

    ctx.strokeStyle = 'rgba(13,27,42,0.35)';
    ctx.lineWidth = 1;
    const stripes = 22;
    for(let i = 0; i <= stripes; i++){
      const x = lerp(left, right, i/stripes);
      ctx.beginPath();
      ctx.moveTo(x, y - height);
      ctx.lineTo(x, y);
      ctx.stroke();
    }
    ctx.restore();

    // top tape
    ctx.fillStyle = '#f2ede2';
    ctx.fillRect(left, y - height - 3, right - left, 4);

    // posts
    ctx.strokeStyle = '#0d1b2a';
    ctx.lineWidth = 3 * scale;
    ctx.beginPath();
    ctx.moveTo(left, y - height - 3);
    ctx.lineTo(left, y + 4);
    ctx.moveTo(right, y - height - 3);
    ctx.lineTo(right, y + 4);
    ctx.stroke();
  }

  function drawEffects(){
    effects.forEach(e => {
      const t = e.t / e.duration;
      const scale = scaleAtZ(e.z);
      const r = lerp(6, 46, t) * scale;
      const sx = xToScreen(e.x, e.z);
      const sy = tableYAtZ(e.z);
      ctx.save();
      ctx.globalAlpha = (1 - t) * 0.8;
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 2.5 * scale;
      ctx.beginPath();
      ctx.ellipse(sx, sy, r, r * 0.35, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    });
  }

  function drawPaddle(entity, mainColor, darkColor){
    const scale = scaleAtZ(entity.z);
    const pulse = 1 + entity.hitPulse * 0.28;
    const sx = xToScreen(entity.x, entity.z);
    const sy = tableYAtZ(entity.z) - 10 * scale;
    const r = 30 * scale * pulse;

    // handle
    ctx.save();
    ctx.fillStyle = darkColor;
    ctx.fillRect(sx - 5*scale, sy + r*0.55, 10*scale, 22*scale);

    // blade
    const g = ctx.createRadialGradient(sx - r*0.3, sy - r*0.3, r*0.1, sx, sy, r);
    g.addColorStop(0, mainColor);
    g.addColorStop(1, darkColor);
    ctx.beginPath();
    ctx.ellipse(sx, sy, r, r * 0.82, 0, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.strokeStyle = 'rgba(13,27,42,0.6)';
    ctx.lineWidth = 2 * scale;
    ctx.stroke();
    ctx.restore();
  }

  function drawBall(){
    const scale = scaleAtZ(ball.z);
    const baseY = tableYAtZ(ball.z);
    const sx = xToScreen(ball.x, ball.z);
    const heightPx = ball.h * 70 * scale;
    const sy = baseY - heightPx - 5 * scale;
    const rBase = 15 * scale;
    const squashX = rBase * (1 + ball.squash * 0.45);
    const squashY = rBase * (1 - ball.squash * 0.35);

    // shadow on table
    const shadowAlpha = clamp(0.45 - ball.h * 0.25, 0.08, 0.45);
    ctx.save();
    ctx.globalAlpha = shadowAlpha;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(sx, baseY, rBase * 1.15, rBase * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // ball
    const g = ctx.createRadialGradient(sx - squashX*0.3, sy - squashY*0.3, 1, sx, sy, squashX);
    g.addColorStop(0, '#ffe3b0');
    g.addColorStop(0.55, '#f2a340');
    g.addColorStop(1, '#c97318');
    ctx.beginPath();
    ctx.ellipse(sx, sy, squashX, squashY, 0, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.strokeStyle = 'rgba(13,27,42,0.35)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function draw(){
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    drawTable();
    drawNet();
    drawEffects();

    const items = [
      { z: ai.z,     fn: () => drawPaddle(ai, '#5b8fdb', '#1e4a8a') },
      { z: ball.z,   fn: drawBall },
      { z: player.z, fn: () => drawPaddle(player, '#e05a4a', '#8f1f1f') }
    ];
    items.sort((a, b) => b.z - a.z);
    items.forEach(it => it.fn());
  }

  // ---------------------------------------------------------------
  // Main loop
  // ---------------------------------------------------------------
  let lastTime = null;
  function loop(ts){
    if(lastTime == null) lastTime = ts;
    let dt = (ts - lastTime) / 1000;
    lastTime = ts;
    dt = Math.min(dt, 0.05);

    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

})();
</script>
</body>
</html>
